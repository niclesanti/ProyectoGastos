# Configuracion Común para todos los perfiles
spring.application.name=backend

# Configuración del servidor
server.port=${PORT:8080}

# Activa el perfil 'dev' por defecto si no se especifica otro
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Configuración de Flyway
spring.flyway.encoding=UTF-8

# === Configuración de Actuator (Observabilidad) ===
# Endpoints base de Actuator - Expuestos en todos los perfiles
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=when-authorized

# Información de la aplicación (visible en /actuator/info)
management.info.env.enabled=true
management.info.java.enabled=true
management.info.os.enabled=true

# Métricas de Micrometer - Activar formato Prometheus
management.metrics.export.prometheus.enabled=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.tags.application=${spring.application.name}

# ============================================
# CONFIGURACIÓN DEL AGENTE IA
# ============================================

# Habilitar/Deshabilitar el Agente IA (requiere API Key de Groq)
# Para activar: agente.ia.enabled=true + configurar GROQ_API_KEY
agente.ia.enabled=${AGENTE_IA_ENABLED:false}

# Groq (OpenAI Compatible) - Llama 3.3 70B Versatile
# Extremadamente rápido, gratuito, sin necesidad de facturación
spring.ai.openai.api-key=${GROQ_API_KEY:dummy-key}
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile
spring.ai.openai.chat.options.temperature=0.3
spring.ai.openai.chat.options.max-tokens=2048
spring.ai.openai.chat.options.top-p=0.95

# Rate Limiting para el Agente IA
# Límite: 60 mensajes por minuto por usuario
# Burst capacity: 10 (permite ráfagas cortas)
agente.rate-limit.requests-per-minute=60
agente.rate-limit.burst-capacity=10
